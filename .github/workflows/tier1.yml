name: tier1

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: tier1-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tier0:
    runs-on: [self-hosted, macOS, ARM64, m2]
    # The tier0 job (selfhost byte-identical + demos baseline) runs on
    # the mac m2 (shaka) to validate the Apple-clang toolchain. Its
    # wall-clock was wildly variable (918→1518→2419s for the same ~15
    # min of work) because the `tier1` job used to share the m2: two
    # same-labelled runners (shaka, shaka-2) put tier0 and tier1 on the
    # same physical box, each running a single-threaded `selfhost`
    # (kaic2 at 100% CPU) at once, so tier0 starved and overran the cap.
    # tier1 now runs on the Linux runner (see below), so tier0 no longer
    # competes with it. The 40 min cap stays as headroom in case two
    # different PRs land on shaka + shaka-2 simultaneously; selfhost
    # itself is ~1.7 min and the demos baseline dominates.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Doc-only PRs (diff confined to docs/, root *.md, LICENSE)
      # short-circuit here with SUCCESS so the required tier1 check
      # is satisfied without spending a runner. Branch-protection on
      # main lists tier1 as required, so this workflow MUST always
      # produce a tier1 status — if we paths-ignored it instead, doc
      # PRs would get stuck in BLOCKED forever.
      - name: Detect doc-only diff
        id: doc-only
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if [ -z "$CHANGED" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NON_DOC=$(echo "$CHANGED" | grep -Ev '^(docs/|[^/]+\.md$|LICENSE$)' || true)
          if [ -z "$NON_DOC" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Doc-only PR; skipping tier0 build."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify toolchain available (self-hosted shaka, Xcode CLT)
        if: steps.doc-only.outputs.skip != 'true'
        run: |
          which clang || { echo "::error::clang not found on runner"; exit 1; }
          which make  || { echo "::error::make not found on runner";  exit 1; }

      - name: Toolchain versions
        if: steps.doc-only.outputs.skip != 'true'
        run: |
          cc --version
          clang --version
          make --version | head -1

      # Pin CC=clang so the runner uses the same compiler family
      # as the macOS dev environment (clang). R5 (the euler4
      # main-thread stack overflow that was previously gated by
      # `BASELINE=23`) is now resolved for *emitted programs*
      # by issue #37 — the emitter rewrites every self-tail-call
      # into a goto-loop at the C-emit boundary, so deep
      # self-recursion in kaikai source uses O(1) C-stack. The
      # PR #36 `RLIMIT_STACK` constructor in `stage0/runtime.h`
      # is retained until the rewrite is mirrored into
      # `stage1/compiler.kai` (the kaic2 binary's own internal
      # `lex_loop` etc. are emitted by stage 1, which still
      # uses recursive C calls). CI reads `demos/baseline.txt = 24`
      # like local mac.
      - name: tier0 (selfhost byte-identical + demos baseline)
        if: steps.doc-only.outputs.skip != 'true'
        run: make CC=clang tier0

      - name: Working tree clean check
        if: steps.doc-only.outputs.skip != 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after tier0; build artifacts leaked into tracked paths"
            git status
            exit 1
          fi

  tier1:
    # Runs on the Linux runner (nibiru), NOT the mac m2 (shaka), so it
    # does not compete with the `tier0` job for the same machine. Both
    # jobs are independent (no `needs:`) and `tier0` is pinned to mac;
    # before this split they both landed on shaka via the two
    # same-labelled m2 runners (shaka, shaka-2) and each ran `selfhost`
    # / a full build simultaneously — two single-threaded kaic2 at
    # 100% CPU on one box — so `tier0` overran its timeout and the
    # workflow was cancelled. tier1-asan and tier1-backend-parity
    # already run on this Linux runner, so the full `make test` is
    # known to build and pass on Linux; tier0 keeps the mac-toolchain
    # coverage (Apple clang, mac stack_size, demos baseline on ARM64).
    runs-on: [self-hosted, Linux, X64]
    # Bumped from 15 → 25 after a series of pre-Hanga-Roa lanes
    # (#646, #650, #651, #653, #654, #660) added ~19 regression
    # fixtures and 2 audit scripts that invoke kaic2 per
    # candidate. The base tier1 was already at 14m 9s on the last
    # green main run — the new work pushed it past 15 min and ran
    # into this timeout. 25 leaves comfortable headroom for the
    # remaining Hanga-Roa lanes without masking a runaway test.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect doc-only diff
        id: doc-only
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if [ -z "$CHANGED" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NON_DOC=$(echo "$CHANGED" | grep -Ev '^(docs/|[^/]+\.md$|LICENSE$)' || true)
          if [ -z "$NON_DOC" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Doc-only PR; skipping tier1 build."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify toolchain available (self-hosted nibiru, Linux clang)
        if: steps.doc-only.outputs.skip != 'true'
        run: |
          which clang || { echo "::error::clang not found on runner"; exit 1; }
          which make  || { echo "::error::make not found on runner";  exit 1; }

      - name: Toolchain versions
        if: steps.doc-only.outputs.skip != 'true'
        run: |
          cc --version
          clang --version
          make --version | head -1

      - name: tier1 (full make test + demos baseline)
        if: steps.doc-only.outputs.skip != 'true'
        run: make CC=clang tier1

      - name: Working tree clean check
        if: steps.doc-only.outputs.skip != 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after tier1; build artifacts leaked into tracked paths"
            git status
            exit 1
          fi
