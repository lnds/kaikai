name: tier1

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: tier1-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tier1:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (clang for LLVM backend tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang

      - name: Toolchain versions
        run: |
          cc --version
          clang --version
          make --version | head -1

      # Pin CC=clang so the runner uses the same compiler family as
      # the macOS dev environment (clang). Avoids a GCC-vs-clang
      # drift that previously caused euler4 to segfault on Linux
      # with the default ubuntu-latest cc=gcc; see PR #33 first run.
      - name: tier0 (selfhost byte-identical + demos baseline)
        run: make CC=clang tier0

      - name: tier1 (full make test + demos baseline)
        run: make CC=clang tier1

      - name: Working tree clean check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after tier1; build artifacts leaked into tracked paths"
            git status
            exit 1
          fi
