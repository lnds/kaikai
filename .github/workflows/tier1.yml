name: tier1

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: tier1-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tier1:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (clang for LLVM backend tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang

      - name: Toolchain versions
        run: |
          cc --version
          clang --version
          make --version | head -1

      # Pin CC=clang so the runner uses the same compiler family
      # as the macOS dev environment (clang). The original hope
      # was that clang would also fix euler4's Linux SEGV — it
      # didn't (clang on Linux segfaults too, see PR #33 second
      # run). The bug is a real Linux runtime divergence, not a
      # gcc-vs-clang drift; it is tracked in
      # docs/known-regressions.md and BASELINE is dropped to 23
      # below until the fix lands. CC=clang stays for the
      # consistency it gives between mac and Linux.
      #
      # BASELINE=23 (vs the local-mac default of 24) lets euler4
      # stay broken on Linux without failing CI. Mac runs keep
      # the strict baseline.txt=24 untouched.
      - name: tier0 (selfhost byte-identical + demos baseline)
        run: make CC=clang BASELINE=23 tier0

      - name: tier1 (full make test + demos baseline)
        run: make CC=clang BASELINE=23 tier1

      - name: Working tree clean check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after tier1; build artifacts leaked into tracked paths"
            git status
            exit 1
          fi
