name: tier1

on:
  pull_request:
    # Skip tier1 on doc-only PRs: docs/, *.md at root, LICENSE,
    # CHANGELOG (release commits hit `push` to main and run there).
    # Code paths (stage*/, stdlib/, examples/, demos/, .github/,
    # Makefile, VERSION, build scripts, etc.) ALWAYS trigger tier1.
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  push:
    branches: [main]

concurrency:
  group: tier1-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tier1:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (clang for LLVM backend tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang

      - name: Toolchain versions
        run: |
          cc --version
          clang --version
          make --version | head -1

      # Pin CC=clang so the runner uses the same compiler family
      # as the macOS dev environment (clang). R5 (the euler4
      # main-thread stack overflow that was previously gated by
      # `BASELINE=23`) is now resolved for *emitted programs*
      # by issue #37 — the emitter rewrites every self-tail-call
      # into a goto-loop at the C-emit boundary, so deep
      # self-recursion in kaikai source uses O(1) C-stack. The
      # PR #36 `RLIMIT_STACK` constructor in `stage0/runtime.h`
      # is retained until the rewrite is mirrored into
      # `stage1/compiler.kai` (the kaic2 binary's own internal
      # `lex_loop` etc. are emitted by stage 1, which still
      # uses recursive C calls). CI reads `demos/baseline.txt = 24`
      # like local mac.
      - name: tier0 (selfhost byte-identical + demos baseline)
        run: make CC=clang tier0

      - name: tier1 (full make test + demos baseline)
        run: make CC=clang tier1

      - name: Working tree clean check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after tier1; build artifacts leaked into tracked paths"
            git status
            exit 1
          fi
