name: tier1

on:
  pull_request:
  # merge_group makes the required checks run inside a GitHub merge queue
  # (harmless while the queue is not enabled in repo settings). The queue
  # tests the batched merge result, so enabling it replaces the
  # require-branches-up-to-date re-run treadmill.
  merge_group:
  push:
    branches: [main]
    # Doc-only pushes (merged doc PRs) and `cz bump` release commits
    # (VERSION + .cz.toml + CHANGELOG.md, the latter covered by '*.md')
    # change nothing the gate tests; the merge commit that introduced code
    # already ran the full gate. No status is required on main pushes, so
    # skipping the whole workflow here is safe — the PR side must instead
    # use the `changes` job below.
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - 'VERSION'
      - '.cz.toml'

# Superseding is right on a PR branch (only the tip matters) and wrong on
# main, where `github.ref` is constant: every merge would kill the in-flight
# run of the commit before it, and that run is the only record that the
# commit was ever verified. Cancel on pull_request only.
concurrency:
  group: tier1-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

# CI structure (docs/ci-time-analysis.md). The tier1 gate's light fixture
# pool is CPU-bound + independent, so it is sharded across SEPARATE
# runners (each with its own memory bus — in-job `-j` is bandwidth-capped).
# A single `build` job bootstraps the C-only kaic2 ONCE and publishes it as
# an artifact; tier0 + the five tier1 shards consume it (download + a
# dependency-ordered mtime touch so `make` rebuilds nothing). The `tier1`
# aggregator job gates on all five shards, so the REQUIRED check is still
# named `tier1` and branch protection needs no change.
jobs:
  # Shared doc-only detection for PRs. Pure-doc PRs short-circuit every
  # downstream job with SUCCESS so the required `tier1` check is satisfied
  # without spending build/test runners. (paths-ignore can't be used on the
  # PR side: branch protection lists `tier1` as required, so the workflow
  # must always produce a status — paths-ignore would leave doc PRs BLOCKED
  # forever. Pushes to main need no status, so they use paths-ignore above.)
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      doc-only: ${{ steps.doc-only.outputs.skip }}
      compiler-touch: ${{ steps.compiler-touch.outputs.touch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect doc-only diff
        id: doc-only
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if [ -z "$CHANGED" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          NON_DOC=$(echo "$CHANGED" | grep -Ev '^(docs/|[^/]+\.md$|LICENSE$)' || true)
          if [ -z "$NON_DOC" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Doc-only PR; skipping tier1 build + shards."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      # Gates the shard-4 whole-compiler self-hosts: they only detect
      # regressions introduced by changes to the sources they compile.
      # PR-only — on push/merge_group the self-hosts always run.
      - name: Detect compiler-source diff
        id: compiler-touch
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "touch=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if [ -z "$CHANGED" ]; then
            echo "touch=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          COMPILER=$(echo "$CHANGED" | grep -E '^(stage2/compiler/|stdlib/|stage2/main\.kai$|stage2/Makefile$|stage2/runtime[^/]*\.h$|stage0/runtime[^/]*\.h$)' || true)
          if [ -z "$COMPILER" ]; then
            echo "touch=false" >> "$GITHUB_OUTPUT"
            echo "No compiler-source changes; shard-4 skips the self-hosts."
          else
            echo "touch=true" >> "$GITHUB_OUTPUT"
          fi

  # Build the C-only kaic2 once and publish the bootstrap chain. Every
  # consuming job downloads this instead of paying the ~260 s bootstrap
  # (45 s bundle regen + 197 s kaic2 -O2 cc + 20 s stage0/1) again.
  build:
    needs: changes
    if: needs.changes.outputs.doc-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          command -v clang >/dev/null 2>&1 || {
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends clang
          }
      # Exact-match cache of the whole bootstrap chain: a hit means the
      # sources that feed kaic2 are byte-identical to a prior green build,
      # so the ~5-min bootstrap is skipped (docs/CI/examples-only PRs).
      # Deliberately NO restore-keys: a near-miss chain plus the mtime touch
      # would masquerade as fresh and make would rebuild nothing — a stale
      # kaic2 presented as current. Exact hit or full bootstrap, nothing
      # in between.
      - name: Fingerprint toolchain for cache key
        id: cc-fp
        run: echo "id=$(clang --version | head -1 | tr -c 'A-Za-z0-9' '-')" >> "$GITHUB_OUTPUT"
      - name: Cache bootstrap chain (exact source match only)
        id: bootstrap-cache
        uses: actions/cache@v4
        with:
          path: |
            stage0/*.o
            stage0/kaic0
            stage1/kaic1
            stage1/build/stage1.c
            stage2/kaic2
            stage2/build/bundle.kai
            stage2/build/stage2.c
          key: kaic2-c-${{ steps.cc-fp.outputs.id }}-${{ hashFiles('Makefile', 'stage0/**', 'stage1/**', 'stage2/**', 'stdlib/**', 'tools/ci-touch-build.sh') }}
      - name: Bootstrap C-only kaic2
        if: steps.bootstrap-cache.outputs.cache-hit != 'true'
        run: make CC=clang kaic2
      - name: Mark cached chain fresh (no rebuild)
        if: steps.bootstrap-cache.outputs.cache-hit == 'true'
        run: |
          chmod +x stage0/kaic0 stage1/kaic1 stage2/kaic2
          ./tools/ci-touch-build.sh
      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaic2-c
          # Only the dependency chain `make` consults to decide up-to-date.
          # NOT stage2/build/*.c fixture outputs (hundreds of MB of test
          # litter that the test jobs regenerate anyway).
          path: |
            stage0/*.o
            stage0/kaic0
            stage1/kaic1
            stage1/build/stage1.c
            stage2/kaic2
            stage2/build/bundle.kai
            stage2/build/stage2.c
          retention-days: 1
          if-no-files-found: error

  # selfhost byte-identical + demos baseline + arena + heap-ceiling.
  # Consumes the shared kaic2 (selfhost re-runs the binary twice and diffs —
  # determinism coverage is unchanged by sharing the build).
  tier0:
    needs: [changes, build]
    if: needs.changes.outputs.doc-only != 'true'
    runs-on: ubuntu-latest
    # Runs ~16-18 min nominal; a ceiling-adjacent timeout turned slow-runner
    # runs into cancel + full re-run, which costs far more than headroom.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang
      - uses: actions/download-artifact@v4
        with:
          name: kaic2-c
      - name: Restore artifact mtimes (no rebuild)
        run: |
          chmod +x stage0/kaic0 stage1/kaic1 stage2/kaic2
          ./tools/ci-touch-build.sh
      - name: tier0 (selfhost byte-identical + demos baseline)
        run: make CC=clang tier0
      - name: Working tree clean check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after tier0; build artifacts leaked into tracked paths"
            git status; exit 1
          fi

  tier1-shard-1:
    needs: [changes, build]
    if: needs.changes.outputs.doc-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang
      - uses: actions/download-artifact@v4
        with:
          name: kaic2-c
      - name: Restore artifact mtimes (no rebuild)
        run: |
          chmod +x stage0/kaic0 stage1/kaic1 stage2/kaic2
          ./tools/ci-touch-build.sh
      - name: tier1-shard-1 (costly self-compiles + caches + tail)
        run: make CC=clang tier1-shard-1
      - name: Working tree clean check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after tier1-shard-1"
            git status; exit 1
          fi

  tier1-shard-2:
    needs: [changes, build]
    if: needs.changes.outputs.doc-only != 'true'
    runs-on: ubuntu-latest
    # Same headroom as shard-1: the tier1 slices run near the ceiling and a
    # slow runner has timed the demos slice out at 25.
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang
      - uses: actions/download-artifact@v4
        with:
          name: kaic2-c
      - name: Restore artifact mtimes (no rebuild)
        run: |
          chmod +x stage0/kaic0 stage1/kaic1 stage2/kaic2
          ./tools/ci-touch-build.sh
      - name: tier1-shard-2 (light slice 1/3)
        run: make CC=clang tier1-shard-2
      - name: Working tree clean check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after tier1-shard-2"
            git status; exit 1
          fi

  tier1-shard-3:
    needs: [changes, build]
    if: needs.changes.outputs.doc-only != 'true'
    runs-on: ubuntu-latest
    # Same headroom as the other tier1 slices, which run near the ceiling.
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang
      - uses: actions/download-artifact@v4
        with:
          name: kaic2-c
      - name: Restore artifact mtimes (no rebuild)
        run: |
          chmod +x stage0/kaic0 stage1/kaic1 stage2/kaic2
          ./tools/ci-touch-build.sh
      - name: tier1-shard-3 (light slice 2/3)
        run: make CC=clang tier1-shard-3
      - name: Working tree clean check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after tier1-shard-3"
            git status; exit 1
          fi

  # Shard 4 — the two whole-compiler modular self-hosts, the slowest single
  # phases in the gate (~15 min combined). Isolated so no shard dominates
  # the critical path. On PRs that touch no compiler source the self-hosts
  # prove nothing, so every step is gated on `compiler-touch` — the job
  # still runs and reports SUCCESS with all steps skipped. The gate MUST
  # stay at step level: a job-level if would mark shard-4 `skipped`, the
  # aggregator requires `success`, and the required check would hang red.
  tier1-shard-4:
    needs: [changes, build]
    if: needs.changes.outputs.doc-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Self-hosts skipped (no compiler-source changes in PR diff)
        if: needs.changes.outputs.compiler-touch != 'true'
        run: echo "tier1-shard-4 OK — PR touches no compiler sources; self-hosts not exercised."
      - uses: actions/checkout@v4
        if: needs.changes.outputs.compiler-touch == 'true'
        with:
          fetch-depth: 0
      - name: Install toolchain
        if: needs.changes.outputs.compiler-touch == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang
      - uses: actions/download-artifact@v4
        if: needs.changes.outputs.compiler-touch == 'true'
        with:
          name: kaic2-c
      - name: Restore artifact mtimes (no rebuild)
        if: needs.changes.outputs.compiler-touch == 'true'
        run: |
          chmod +x stage0/kaic0 stage1/kaic1 stage2/kaic2
          ./tools/ci-touch-build.sh
      # Persist the c-modular .o cache the two full-compiler self-hosts
      # (test-modular-selfhost, test-perceus-1131-modular-escape) share. The
      # cache keys each .o by a content hash of the emitted C + headers +
      # toolchain, so a stale entry is impossible — a mismatch just misses and
      # recompiles. actions/cache only ferries the objects; it cannot produce a
      # false green. The key folds a compiler-source fingerprint (so a warm
      # start correlates with reusable objects) and the clang identity (so a
      # runner-image clang bump does not carry objects from the old compiler);
      # restore-keys lets a run warm-start from the nearest prior cache and let
      # the content hash sort out which objects survive.
      - name: Fingerprint toolchain for cache key
        id: cc-fp
        if: needs.changes.outputs.compiler-touch == 'true'
        run: echo "id=$(clang --version | head -1 | tr -c 'A-Za-z0-9' '-')" >> "$GITHUB_OUTPUT"
      - name: Cache c-modular .o objects (self-host self-compiles)
        if: needs.changes.outputs.compiler-touch == 'true'
        uses: actions/cache@v4
        with:
          path: stage2/build/cmodular-selfhost-cache
          key: cmodular-selfhost-${{ steps.cc-fp.outputs.id }}-${{ hashFiles('stage2/compiler/**', 'stage2/main.kai', 'stdlib/**', 'stage2/runtime*.h', 'stage0/runtime*.h') }}
          restore-keys: |
            cmodular-selfhost-${{ steps.cc-fp.outputs.id }}-
      - name: tier1-shard-4 (whole-compiler modular self-hosts)
        if: needs.changes.outputs.compiler-touch == 'true'
        run: make CC=clang tier1-shard-4
      - name: Working tree clean check
        if: needs.changes.outputs.compiler-touch == 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after tier1-shard-4"
            git status; exit 1
          fi

  # Shard 5 — light slice 3/3.
  tier1-shard-5:
    needs: [changes, build]
    if: needs.changes.outputs.doc-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang
      - uses: actions/download-artifact@v4
        with:
          name: kaic2-c
      - name: Restore artifact mtimes (no rebuild)
        run: |
          chmod +x stage0/kaic0 stage1/kaic1 stage2/kaic2
          ./tools/ci-touch-build.sh
      - name: tier1-shard-5 (light slice 3/3)
        run: make CC=clang tier1-shard-5
      - name: Working tree clean check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after tier1-shard-5"
            git status; exit 1
          fi

  # Aggregator: the REQUIRED check. Green iff every shard is green. Keeping
  # the name `tier1` means branch protection needs no edit. A doc-only PR
  # reaches here via the skipped shards and still reports SUCCESS, satisfying
  # the required check.
  tier1:
    needs: [changes, tier1-shard-1, tier1-shard-2, tier1-shard-3, tier1-shard-4, tier1-shard-5]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gate on all shards
        run: |
          if [ "${{ needs.changes.outputs.doc-only }}" = "true" ]; then
            echo "tier1 OK — doc-only PR, shards skipped"; exit 0
          fi
          r1='${{ needs.tier1-shard-1.result }}'
          r2='${{ needs.tier1-shard-2.result }}'
          r3='${{ needs.tier1-shard-3.result }}'
          r4='${{ needs.tier1-shard-4.result }}'
          r5='${{ needs.tier1-shard-5.result }}'
          echo "shard results: 1=$r1 2=$r2 3=$r3 4=$r4 5=$r5"
          if [ "$r1" = "success" ] && [ "$r2" = "success" ] && [ "$r3" = "success" ] && [ "$r4" = "success" ] && [ "$r5" = "success" ]; then
            echo "tier1 OK — all shards green (full gate coverage)"
          else
            echo "::error::tier1 FAIL — a shard did not succeed"; exit 1
          fi
