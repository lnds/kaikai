name: tier1-stdlib-core

# tier1-stdlib-core runs the intrinsic `test "..." { ... }` blocks
# that live inside stdlib/core/*.kai modules (issue #170 phase 1).
# It is structurally narrower than tier1: only diffs that touch
# stdlib/core/ trigger this workflow, so a typer-only or fmt-only
# PR doesn't pay for it.
#
# Rationale: stdlib/core modules are the deepest dependency in the
# language — every kaikai program loads them as auto-preludes — but
# they had zero unit-test coverage before #170. The "C híbrida"
# strategy keeps the tests in source (so they're discoverable and
# co-located with the code they exercise) while gating execution on
# path so that unrelated PRs aren't taxed.
on:
  pull_request:
    paths:
      - 'stdlib/core/**'
      - 'stage2/Makefile'
      - 'bin/kai'
      - '.github/workflows/tier1-stdlib-core.yml'
  push:
    branches: [main]

concurrency:
  group: tier1-stdlib-core-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tier1-stdlib-core:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (clang)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang

      - name: Toolchain versions
        run: |
          cc --version
          clang --version
          make --version | head -1

      - name: tier1-stdlib-core (intrinsic tests for stdlib/core/*.kai)
        run: make -C stage2 CC=clang test-stdlib-core-intrinsic

      - name: Working tree clean check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after tier1-stdlib-core; build artifacts leaked into tracked paths"
            git status
            exit 1
          fi
