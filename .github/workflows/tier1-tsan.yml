name: tier1-tsan

# tier1-tsan runs `make test-mn-tsan` (the M:N cross-thread concurrency
# fixture built with -fsanitize=thread, run at KAI_THREADS=4) on PRs that
# touch the runtime or the concurrency fixtures. A data race on a
# mis-partitioned runtime global under the work-stealing scheduler passes
# every stdout-diff at N=1 and corrupts nondeterministically under load;
# only ThreadSanitizer sees it. Zero races is the merge gate for M:N.
#
# Structurally narrower than tier1 (path-gated to the code that can produce
# a race) and off the tier1 TEST_LIGHT path entirely — TSAN is slow, so a
# typer- or fmt-only PR does not pay the tax.
on:
  pull_request:
    paths:
      - 'stage0/runtime.h'
      - 'stage0/runtime_llvm.c'
      - 'stage2/runtime.h'
      - 'stage2/Makefile'
      - 'stdlib/actor.kai'
      - 'stdlib/spawn.kai'
      - 'examples/effects/mn_cross_thread_copy_stress.kai'
      - 'examples/effects/mn_reactor_io_cpu_mix.kai'
      - 'demos/parallel_actors/**'
      - 'tools/run-mn-tsan.sh'
      - 'tools/run-mn-reactor-bench.sh'
      - '.github/workflows/tier1-tsan.yml'
  push:
    branches: [main]

concurrency:
  group: tier1-tsan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tier1-tsan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang

      - name: Build kaic2 (C backend)
        run: make CC=clang kaic2

      - name: M:N ThreadSanitizer + determinism gate
        run: make CC=clang test-mn-tsan

      - name: F2 reactor no-starvation gate
        run: make CC=clang test-mn-reactor-bench

      - name: Working tree clean check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after tier1-tsan"
            git status
            exit 1
          fi
