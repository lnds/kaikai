name: tier1-backend-parity

# tier1-backend-parity (issue #575) builds every entry-point fixture
# under examples/{effects,actors,spawn,perceus,refinements,llvm,
# packages,minimal,quickstart,stdlib,attributes,unstable} and demos/
# with both the C and the LLVM backend, runs both binaries, and
# diffs stdout + exit code. Any divergence is a backend bug.
#
# Rationale: five LLVM-only failures (#513, #522, #524, #570, #571)
# shipped to main in two weeks because no automated check exercised
# both backends on the same source. The C backend is the
# spec-by-construction (it is the bootstrap path); the LLVM backend
# is the production target. They must agree on every program kaikai
# can express.
#
# Skip discipline: fixtures known to be LLVM-broken are listed in
# tools/backend-parity-skips.txt with a paired tracking issue. The
# skip is the bookmark; the issue is the work. Inline annotation
# (`// skip-backend-parity: <reason>` on the first line) covers
# fixtures that are intentionally backend-specific by design.
on:
  pull_request:
    paths:
      - 'stage0/**'
      - 'stage1/**'
      - 'stage2/**'
      - 'stdlib/**'
      - 'examples/**'
      - 'demos/**'
      - 'bin/kai'
      - 'tools/test-backend-parity.sh'
      - 'tools/backend-parity-skips.txt'
      - '.github/workflows/tier1-backend-parity.yml'
  push:
    branches: [main]

concurrency:
  group: tier1-backend-parity-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tier1-backend-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Doc-only PRs (diff confined to docs/, root *.md, LICENSE)
      # short-circuit here with SUCCESS so the required check is
      # satisfied without spending a runner. Mirrors the tier1.yml
      # doc-only gate — the workflow's `paths:` trigger above already
      # excludes pure-doc PRs from this workflow entirely, but a PR
      # that mixes a path-trigger file with doc edits would still
      # spend an hour here without this guard.
      - name: Detect doc-only diff
        id: doc-only
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if [ -z "$CHANGED" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NON_DOC=$(echo "$CHANGED" | grep -Ev '^(docs/|[^/]+\.md$|LICENSE$)' || true)
          if [ -z "$NON_DOC" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Doc-only PR; skipping tier1-backend-parity build."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install toolchain
        if: steps.doc-only.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang

      - name: Bootstrap kaikai (kaic0 → kaic1 → kaic2)
        if: steps.doc-only.outputs.skip != 'true'
        run: make CC=clang all

      # Pre-build the kai-pkg helper once, serially, before the parity
      # fan-out. The harness runs 16 workers in parallel that all share
      # the single tools/kai-pkg/kai-pkg; without a warm binary the first
      # package fixtures race each other through ensure_kaipkg — a loser
      # reaches the execute site while the winner is mid-`cc -o` and dies
      # with "Permission denied" / "Text file busy" (the flake that
      # surfaced as a 1-fixture parity fail on package fixtures). bin/kai
      # now also builds atomically under a lock, but warming the binary
      # here removes the contention entirely and starts the fan-out
      # faster. CC=clang matches the bootstrap toolchain.
      - name: Warm kai-pkg helper (avoid parallel-fan-out build race)
        if: steps.doc-only.outputs.skip != 'true'
        run: CC=clang bin/kai build tools/kai-pkg/main.kai -o tools/kai-pkg/kai-pkg

      - name: tier1-backend-parity (every fixture, both backends, diff stdout + rc)
        if: steps.doc-only.outputs.skip != 'true'
        run: tools/test-backend-parity.sh

      - name: Working tree clean check
        if: steps.doc-only.outputs.skip != 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after tier1-backend-parity; build artifacts leaked into tracked paths"
            git status
            exit 1
          fi
