name: rc-detector

# RC self-host detector — runs a directed RC corpus under ASAN +
# no-cell-pool and a strict per-tag ledger on BOTH backends, asserting
# that no cell is freed more than it was allocated (the double-free /
# use-after-free family the cell pool masks and the C oracle shares).
#
# NOT a per-PR merge gate: it is heavy (build x2 backends x corpus) and
# would tax every PR. Instead it is path-gated to the code that can
# introduce an RC regression (perceus, emit, KIR lowering, the native
# emitter, the runtime, the RC fixtures) plus a daily cron, so it runs
# where the risk is and stays out of the way otherwise. The native half
# needs libLLVM; ubuntu-latest + apt llvm-dev provides it.
on:
  pull_request:
    paths:
      - 'stage0/runtime.h'
      - 'stage0/runtime_llvm.c'
      - 'stage2/compiler/perceus.kai'
      - 'stage2/compiler/emit_c.kai'
      - 'stage2/compiler/kir_lower_*.kai'
      - 'stage2/compiler/emit_native*.kai'
      - 'examples/perceus/**'
      - 'tools/rc-selfhost-detector.sh'
      - 'tools/rc-detector-corpus.txt'
      - '.github/workflows/rc-detector.yml'
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

concurrency:
  group: rc-detector-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rc-detector:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Install toolchain (clang + libLLVM)"
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang llvm-dev
          LLVM_CONFIG="$(command -v llvm-config || ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -1)"
          if [ -z "$LLVM_CONFIG" ]; then
            echo "::error::no llvm-config found after installing llvm-dev"; exit 1
          fi
          echo "LLVM_CONFIG=$LLVM_CONFIG" >> "$GITHUB_ENV"
          echo "using $LLVM_CONFIG ($($LLVM_CONFIG --version))"

      - name: "Run RC detector (both backends)"
        run: make -C stage2 CC=clang LLVM_CONFIG="$LLVM_CONFIG" rc-detector
