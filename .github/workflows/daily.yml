name: daily

# Tier 2 cron — runs `make daily` once a day on main HEAD plus on
# manual dispatch. Tier 2 (per CLAUDE.md / docs/testing-tiers.md)
# is diagnostic, not a gate: failures here do NOT block PRs.
# Instead, a failed run opens an issue tagged `daily-failure` so
# the next morning's lane has a concrete entry point.
#
# Schedule: 02:00 UTC ≈ 22:00 / 23:00 Chile (the maintainer's
# evening), matching the "end-of-day" cadence pinned in CLAUDE.md.
# Adjust if the dev rhythm shifts; the literal time is not
# load-bearing, the daily cadence is.

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: daily-main
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install toolchain (clang for LLVM backend tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang

      - name: Toolchain versions
        run: |
          cc --version
          clang --version
          make --version | head -1

      - name: make daily
        id: daily
        run: make CC=clang daily

      - name: Open issue on daily failure
        # `cancelled()` covers the timeout case: a job killed at
        # `timeout-minutes` reports `cancelled`, not `failure`, so a
        # `failure()`-only guard let every timed-out run pass silently with
        # no diagnostic. A timeout IS a signal worth an issue.
        if: (failure() || cancelled()) && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          today=$(date -u +%Y-%m-%d)
          # `--label` only attaches a label that already exists; create it
          # idempotently first, else `gh issue create` errors out (which is
          # exactly what silently broke the 2026-06-16 failure run).
          gh label create daily-failure \
            --color B60205 --description "Tier 2 daily cron failure" 2>/dev/null || true
          gh issue create \
            --title "daily: tier 2 cron failed on $today" \
            --label "daily-failure" \
            --body "$(cat <<EOF
          The scheduled \`make daily\` run on \`main\` HEAD (commit \`${{ github.sha }}\`) failed.

          Tier 2 failures are diagnostics, not blockers. Per CLAUDE.md:

          > A \`daily\` failure opens a lane the next morning; do not jam velocity by treating it as a per-PR gate.

          ## Triage path

          1. Inspect the run: ${run_url}
          2. Reproduce locally: \`make CC=clang daily\` (baseline from demos/baseline.txt).
          3. Identify whether the failure is in \`tier1\`, stress fixtures, the coverage probe, or the RC budget.
          4. Open a focused PR fixing the specific gate; close this issue once the next daily run is green.

          If the failure is the same as a previously opened daily-failure issue, dedupe by closing this one with a reference.
          EOF
          )"
