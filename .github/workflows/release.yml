name: release

# Triggered by version tag pushes (`v*`) — produces a GitHub Release with
# platform-specific tarballs as assets. Manual dispatch is also allowed
# for re-running against an existing tag if a build needs to be redone.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.39.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            os_name: darwin
            arch: arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - name: Read version
        id: meta
        run: |
          ver="$(cat VERSION)"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          tag="${{ steps.tag.outputs.tag }}"
          if [ "v$ver" != "$tag" ]; then
            echo "::error::tag $tag does not match VERSION $ver"
            exit 1
          fi

      - name: Build release tarball
        run: ./scripts/build-release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaikai-v${{ steps.meta.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}
          path: |
            dist/kaikai-v${{ steps.meta.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz
            dist/kaikai-v${{ steps.meta.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create or update release
        env:
          # The release lives on kaikailang-org/kaikai (public mirror), which
          # the default GITHUB_TOKEN cannot reach from this work-repo workflow
          # (403 "Resource not accessible by integration"). TAP_PAT has
          # cross-repo scope across the kaikailang-org/* family.
          GH_TOKEN: ${{ secrets.TAP_PAT }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          # If a release already exists for this tag (e.g. when re-running via
          # workflow_dispatch), upload assets to it; otherwise create a new
          # release with auto-generated notes.
          if gh release view "$tag" --repo kaikailang-org/kaikai >/dev/null 2>&1; then
            echo "release $tag exists; uploading new assets with --clobber"
            gh release upload "$tag" --repo kaikailang-org/kaikai --clobber dist/*
          else
            echo "creating release $tag"
            gh release create "$tag" --repo kaikailang-org/kaikai \
              --title "kaikai $tag" \
              --generate-notes \
              dist/*
          fi

  update-tap:
    name: Update Homebrew tap formula
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download sha256 from release
        env:
          # Use TAP_PAT for cross-repo gh API consistency with the release job.
          GH_TOKEN: ${{ secrets.TAP_PAT }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          version="${{ steps.tag.outputs.version }}"
          asset="kaikai-v${version}-darwin-arm64.tar.gz.sha256"
          gh release download "$tag" --repo kaikailang-org/kaikai \
            --pattern "$asset" --dir /tmp/release-assets
          # File format: "<sha256>  <filename>"
          sha=$(awk '{print $1}' "/tmp/release-assets/$asset")
          if [ -z "$sha" ] || [ ${#sha} -ne 64 ]; then
            echo "::error::invalid sha256 in $asset: '$sha'"
            exit 1
          fi
          echo "sha256=$sha" >> "$GITHUB_ENV"

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: kaikailang-org/homebrew-kaikai
          token: ${{ secrets.TAP_PAT }}
          path: tap

      - name: Patch Formula/kaikai.rb
        run: |
          version="${{ steps.tag.outputs.version }}"
          tag="${{ steps.tag.outputs.tag }}"
          sha="$sha256"
          formula="tap/Formula/kaikai.rb"
          # version "X.Y.Z"
          sed -i -E "s|^(  version )\"[0-9.]+\"|\1\"${version}\"|" "$formula"
          # url "https://github.com/lnds/kaikai/releases/download/vX.Y.Z/kaikai-vX.Y.Z-...
          sed -i -E "s|/releases/download/v[0-9.]+/kaikai-v[0-9.]+-|/releases/download/${tag}/kaikai-${tag}-|g" "$formula"
          # sha256 "..."
          sed -i -E "s|sha256 \"[0-9a-f]{64}\"|sha256 \"${sha}\"|" "$formula"
          echo "--- patched formula ---"
          grep -E "version |url |sha256 " "$formula"

      - name: Commit and push to tap
        run: |
          version="${{ steps.tag.outputs.version }}"
          cd tap
          if git diff --quiet; then
            echo "no changes to formula; skipping commit"
            exit 0
          fi
          git config user.name "kaikai-release-bot"
          git config user.email "kaikai-release-bot@users.noreply.github.com"
          git add Formula/kaikai.rb
          git commit -m "chore(formula): bump to v${version}"
          git push origin HEAD

  publish-source:
    name: Mirror filtered source to kaikailang-org/kaikai
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout work repo (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install git-filter-repo
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git-filter-repo

      - name: Configure git identity for the mirror commit
        run: |
          git config user.name "kaikai-release-bot"
          git config user.email "kaikai-release-bot@users.noreply.github.com"

      - name: Filter internal-only paths + strip Claude trailers
        run: |
          # Mirror the logic of tools/publish.sh in-process. Run in the
          # checked-out workspace; force-pushes go to kaikailang-org/kaikai.
          git filter-repo \
            --path-glob 'docs/lane-experience-*.md' \
            --path-glob 'docs/lane-audit-*.md' \
            --path-glob 'docs/*audit*.md' \
            --path-glob 'docs/*honesty*.md' \
            --path-glob 'docs/*followup*.md' \
            --path-glob 'docs/nocturnal-*.md' \
            --path tools/coverage-baseline.txt \
            --path tools/symbolize-rc-trace.sh \
            --path tools/bench-phases.sh \
            --invert-paths \
            --message-callback '
          import re
          text = message.decode("utf-8", errors="replace")
          text = re.sub(r"^Co-Authored-By: .*Claude.*\n?", "", text, flags=re.MULTILINE | re.IGNORECASE)
          text = re.sub(r"^.*Generated with .*Claude.*\n?", "", text, flags=re.MULTILINE | re.IGNORECASE)
          text = re.sub(r"^🤖.*\n?", "", text, flags=re.MULTILINE)
          text = re.sub(r"\n{3,}$", "\n\n", text)
          return text.encode("utf-8")
          ' \
            --force

      - name: Replace CLAUDE.md, add CONTRIBUTING.md, sed-clean decisions
        run: |
          cp tools/publish/CLAUDE.md.public CLAUDE.md
          cp tools/publish/CONTRIBUTING.md.public CONTRIBUTING.md
          sed -i \
            -e 's|See `docs/lane-experience-kai-repl-watch.md` for the|See an internal lane report for the|' \
            -e 's|`docs/lane-experience-kai-repl-watch.md` is left intact as the|the internal lane report is preserved as the|' \
            docs/decisions/repl-removal-2026-05-09.md
          git add CLAUDE.md CONTRIBUTING.md docs/decisions/repl-removal-2026-05-09.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: prepare public mirror (CLAUDE.md trimmed, CONTRIBUTING.md added)"
          fi

      - name: Push filtered main to public
        env:
          PUBLISH_TOKEN: ${{ secrets.TAP_PAT }}
        run: |
          git remote add public "https://x-access-token:${PUBLISH_TOKEN}@github.com/kaikailang-org/kaikai.git"
          git push public main:main --force

      - name: Push filtered tags to public (one-by-one to avoid SSH pack hang)
        env:
          PUBLISH_TOKEN: ${{ secrets.TAP_PAT }}
        run: |
          # Iterate tags individually; SSH batch tag push has hung on
          # macOS in the past. HTTPS via PAT works the same on Linux but
          # we stay defensive.
          for tag in $(git tag --list 'v*' | sort); do
            git push public "refs/tags/${tag}:refs/tags/${tag}" --force || {
              echo "::warning::failed to push tag $tag"
            }
          done
