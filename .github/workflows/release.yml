name: release

# Triggered by version tag pushes (`v*`) — produces a GitHub Release with
# platform-specific tarballs as assets. Manual dispatch is also allowed
# for re-running against an existing tag if a build needs to be redone.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.39.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            os_name: darwin
            arch: arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - name: Read version
        id: meta
        run: |
          ver="$(cat VERSION)"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          tag="${{ steps.tag.outputs.tag }}"
          if [ "v$ver" != "$tag" ]; then
            echo "::error::tag $tag does not match VERSION $ver"
            exit 1
          fi

      - name: Build release tarball
        run: ./scripts/build-release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaikai-v${{ steps.meta.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}
          path: |
            dist/kaikai-v${{ steps.meta.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz
            dist/kaikai-v${{ steps.meta.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create or update release
        env:
          # The release lives on kaikailang-org/kaikai (public mirror), which
          # the default GITHUB_TOKEN cannot reach from this work-repo workflow
          # (403 "Resource not accessible by integration"). TAP_PAT has
          # cross-repo scope across the kaikailang-org/* family.
          GH_TOKEN: ${{ secrets.TAP_PAT }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          # If a release already exists for this tag (e.g. when re-running via
          # workflow_dispatch), upload assets to it; otherwise create a new
          # release with auto-generated notes.
          if gh release view "$tag" --repo kaikailang-org/kaikai >/dev/null 2>&1; then
            echo "release $tag exists; uploading new assets with --clobber"
            gh release upload "$tag" --repo kaikailang-org/kaikai --clobber dist/*
          else
            echo "creating release $tag"
            gh release create "$tag" --repo kaikailang-org/kaikai \
              --title "kaikai $tag" \
              --generate-notes \
              dist/*
          fi

  update-tap:
    name: Update Homebrew tap formula
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download sha256 from release
        env:
          # Use TAP_PAT for cross-repo gh API consistency with the release job.
          GH_TOKEN: ${{ secrets.TAP_PAT }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          version="${{ steps.tag.outputs.version }}"
          asset="kaikai-v${version}-darwin-arm64.tar.gz.sha256"
          gh release download "$tag" --repo kaikailang-org/kaikai \
            --pattern "$asset" --dir /tmp/release-assets
          # File format: "<sha256>  <filename>"
          sha=$(awk '{print $1}' "/tmp/release-assets/$asset")
          if [ -z "$sha" ] || [ ${#sha} -ne 64 ]; then
            echo "::error::invalid sha256 in $asset: '$sha'"
            exit 1
          fi
          echo "sha256=$sha" >> "$GITHUB_ENV"

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: kaikailang-org/homebrew-kaikai
          token: ${{ secrets.TAP_PAT }}
          path: tap

      - name: Patch Formula/kaikai.rb
        run: |
          version="${{ steps.tag.outputs.version }}"
          tag="${{ steps.tag.outputs.tag }}"
          sha="$sha256"
          formula="tap/Formula/kaikai.rb"
          # version "X.Y.Z"
          sed -i -E "s|^(  version )\"[0-9.]+\"|\1\"${version}\"|" "$formula"
          # url "https://github.com/lnds/kaikai/releases/download/vX.Y.Z/kaikai-vX.Y.Z-...
          sed -i -E "s|/releases/download/v[0-9.]+/kaikai-v[0-9.]+-|/releases/download/${tag}/kaikai-${tag}-|g" "$formula"
          # sha256 "..."
          sed -i -E "s|sha256 \"[0-9a-f]{64}\"|sha256 \"${sha}\"|" "$formula"
          echo "--- patched formula ---"
          grep -E "version |url |sha256 " "$formula"

      - name: Commit and push to tap
        run: |
          version="${{ steps.tag.outputs.version }}"
          cd tap
          if git diff --quiet; then
            echo "no changes to formula; skipping commit"
            exit 0
          fi
          git config user.name "kaikai-release-bot"
          git config user.email "kaikai-release-bot@users.noreply.github.com"
          git add Formula/kaikai.rb
          git commit -m "chore(formula): bump to v${version}"
          git push origin HEAD

  publish-source:
    name: Mirror filtered source to kaikailang-org/kaikai
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout work repo at tag (no persisted creds)
        # persist-credentials: false is load-bearing. With the default
        # (true), actions/checkout installs http.extraheader with the
        # ephemeral GITHUB_TOKEN. That header applies to every push to
        # github.com — including push to the public mirror — and
        # overrides the PAT embedded in the remote URL, producing a
        # 403 "denied to github-actions[bot]" that broke this job for
        # 8 consecutive releases (v0.63.0 → v0.68.1).
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          persist-credentials: false

      - name: Verify VERSION matches tag
        run: |
          ver="$(cat VERSION)"
          tag="${{ steps.tag.outputs.tag }}"
          if [ "v$ver" != "$tag" ]; then
            echo "::error::tag $tag does not match VERSION $ver"
            exit 1
          fi

      - name: Apply public-mirror overlay
        run: |
          # Replace CLAUDE.md / add CONTRIBUTING.md / scrub the one
          # internal-lane-report reference in docs/decisions/.
          cp tools/publish/CLAUDE.md.public CLAUDE.md
          cp tools/publish/CONTRIBUTING.md.public CONTRIBUTING.md
          sed -i \
            -e 's|See `docs/lane-experience-kai-repl-watch.md` for the|See an internal lane report for the|' \
            -e 's|`docs/lane-experience-kai-repl-watch.md` is left intact as the|the internal lane report is preserved as the|' \
            docs/decisions/repl-removal-2026-05-09.md
          # Strip internal-only paths from the working tree. The mirror
          # is published as a single orphan commit, so removing the
          # files from the worktree is enough — no history rewrite,
          # no `git filter-repo`, no prune-empty hazards.
          rm -f docs/lane-experience-*.md \
                docs/lane-audit-*.md \
                docs/*audit*.md \
                docs/*honesty*.md \
                docs/*followup*.md \
                docs/nocturnal-*.md \
                tools/coverage-baseline.txt \
                tools/symbolize-rc-trace.sh \
                tools/bench-phases.sh

      - name: Push orphan snapshot as main + tag
        env:
          PUBLISH_TOKEN: ${{ secrets.TAP_PAT }}
        run: |
          # The mirror is intentionally history-free: a single orphan
          # commit per release containing the filtered snapshot at this
          # tag. Both `main` and `${tag}` point at the same commit,
          # which makes the VERSION-at-tag check tautological — it can
          # never drift again. This matches what the integrator did by
          # hand to recover from the 8-release outage at v0.68.1.
          # Releases on the public mirror's Releases page (with the
          # darwin-arm64 tarball) remain the canonical source of
          # historical artifacts; full development history lives on
          # lnds/kaikai.
          git config user.name "kaikai-release-bot"
          git config user.email "kaikai-release-bot@users.noreply.github.com"
          tag="${{ steps.tag.outputs.tag }}"
          git checkout --orphan public-snapshot
          git add -A
          git commit -m "release: ${tag}

          Filtered snapshot of lnds/kaikai at ${tag}.
          See https://github.com/lnds/kaikai for full development history."
          git remote add public "https://x-access-token:${PUBLISH_TOKEN}@github.com/kaikailang-org/kaikai.git"
          git push public HEAD:refs/heads/main --force
          git tag -f "$tag"
          git push public "refs/tags/${tag}" --force
