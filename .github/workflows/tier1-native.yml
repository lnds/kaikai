name: tier1-native

# tier1-native (KIR Lane 1.2, docs/kir-design.md §"Lane 1.2") gates the
# in-process libLLVM NATIVE backend (`kaic2 --emit=native`,
# docs/kir-design.md §7.2): it builds kaic2 with `KAI_LLVM=1`, then for
# every entry-point fixture emits a native object IN MEMORY via the LLVM C
# API, links it against the effects runtime, runs it, and diffs stdout +
# exit code against the C-direct backend (the oracle).
#
# Why this is an ALWAYS-ON PR gate (not path-gated): since the Lane 1.5 flip
# the in-process libLLVM native backend is the DEFAULT of `kai build` /
# `kai run`, so any change can regress it.
#
# Structure (docs/ci-time-analysis.md §7): a single `build-native` job
# builds the libLLVM kaic2 + P2 bitcode ONCE and publishes them; the corpus
# ratchet (~620 fixtures, the dominant cost) is sharded across two runners
# via $BACKEND_PARITY_DIRS (disjoint subsets whose union is the full corpus).
# native is the DEFAULT backend and deserves equal-or-better coverage than
# the C oracle — sharding cuts wall-clock without dropping a single fixture.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: tier1-native-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      doc-only: ${{ steps.doc-only.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect doc-only diff
        id: doc-only
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if [ -z "$CHANGED" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          NON_DOC=$(echo "$CHANGED" | grep -Ev '^(docs/|[^/]+\.md$|LICENSE$)' || true)
          if [ -z "$NON_DOC" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Doc-only PR; skipping tier1-native."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  # Build the libLLVM-capable kaic2 + P2 runtime bitcode once, assert P2 is
  # active (clang 18 — a dropped clang 18 is a red build, not a silent perf
  # regression), and publish for the shards. Both shards run on identical
  # ubuntu-latest with the same apt llvm-dev, so the dynamically-linked
  # libLLVM kaic2 is ABI-compatible across them.
  build-native:
    needs: changes
    if: needs.changes.outputs.doc-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install toolchain (clang + libLLVM)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang llvm-dev
          LLVM_CONFIG="$(command -v llvm-config || ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -1)"
          if [ -z "$LLVM_CONFIG" ]; then
            echo "::error::no llvm-config found after installing llvm-dev"; exit 1
          fi
          echo "LLVM_CONFIG=$LLVM_CONFIG" >> "$GITHUB_ENV"
          echo "using $LLVM_CONFIG ($($LLVM_CONFIG --version))"
      - name: Build native kaic2 + assert P2 bitcode
        run: |
          rm -f stage2/kaic2
          make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" kaic2 >/dev/null 2>&1
          tools/assert-runtime-bc.sh
      # Native self-host gate: compile the compiler itself with the native
      # backend and ratchet the `unbound register` subset-gap count against
      # tools/native-selfhost-baseline.txt — green at baseline, red only on
      # regression (count rises). tier1-native is not a required check (only
      # tier1 gates the merge), so a red here is visible on the PR but does
      # not block an unrelated merge. Runs here because build-native already
      # produced the KAI_LLVM=1 kaic2 + P2 bitcode; the gate relinks kaic2
      # itself (seconds). Native-only — does not touch the C bootstrap.
      - name: "Native self-host gate (ratchet — fails only on regression)"
        run: CC=clang LLVM_CONFIG="$LLVM_CONFIG" tools/test-native-selfhost-gate.sh
      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaic2-native
          path: |
            stage0/*.o
            stage0/kaic0
            stage1/kaic1
            stage1/build/stage1.c
            stage2/kaic2
            stage2/build/bundle.kai
            stage2/build/stage2.c
            stage0/runtime_llvm.bc
            stage0/runtime_llvm.bc.stamp
          retention-days: 1
          if-no-files-found: error

  # Shard 1 — first corpus subset + the curated smoke. Subset chosen to
  # balance fixture count against shard 2 (~289 vs ~257 entry points).
  native-shard-1:
    needs: [changes, build-native]
    if: needs.changes.outputs.doc-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install toolchain (clang + libLLVM)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang llvm-dev
          LLVM_CONFIG="$(command -v llvm-config || ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -1)"
          echo "LLVM_CONFIG=$LLVM_CONFIG" >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with:
          name: kaic2-native
      - name: Restore artifact mtimes (no rebuild)
        run: |
          chmod +x stage0/kaic0 stage1/kaic1 stage2/kaic2
          ./tools/ci-touch-build.sh
      - name: "Smoke: every examples/native fixture (emit -> link -> run -> diff)"
        run: CC=clang LLVM_CONFIG="$LLVM_CONFIG" tools/test-native-parity.sh
      - name: "Ratchet shard 1 (effects/actors/spawn/perceus/refinements/llvm vs C-direct)"
        run: |
          CC=clang LLVM_CONFIG="$LLVM_CONFIG" \
            TARGET_BACKEND=native ORACLE_BACKEND=c NATIVE_PARITY_RATCHET=1 \
            BACKEND_PARITY_DIRS="examples/effects examples/actors examples/spawn examples/perceus examples/refinements examples/llvm" \
            tools/test-backend-parity.sh
      - name: Working tree clean check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after native-shard-1"; git status; exit 1
          fi

  # Shard 2 — remaining corpus subset + the #860 cons-RC and #882
  # rotation-reuse native ledger gates.
  native-shard-2:
    needs: [changes, build-native]
    if: needs.changes.outputs.doc-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install toolchain (clang + libLLVM)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang llvm-dev
          LLVM_CONFIG="$(command -v llvm-config || ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -1)"
          echo "LLVM_CONFIG=$LLVM_CONFIG" >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with:
          name: kaic2-native
      - name: Restore artifact mtimes (no rebuild)
        run: |
          chmod +x stage0/kaic0 stage1/kaic1 stage2/kaic2
          ./tools/ci-touch-build.sh
      - name: "Ratchet shard 2 (packages/minimal/quickstart/stdlib/attributes/unstable/demos vs C-direct)"
        run: |
          CC=clang LLVM_CONFIG="$LLVM_CONFIG" \
            TARGET_BACKEND=native ORACLE_BACKEND=c NATIVE_PARITY_RATCHET=1 \
            BACKEND_PARITY_DIRS="examples/packages examples/minimal examples/quickstart examples/stdlib examples/attributes examples/unstable demos" \
            tools/test-backend-parity.sh
      - name: "tier1-native #860 cons RC cascade (free_total == alloc_total-1)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-860-native-cons-leak
      - name: "tier1-native #747 variant Real-slot UAF (ASAN clean + parity)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-747-native-real-slot-uaf
      - name: "tier1-native #1048 record scope-exit decref (free_total >= alloc_total-10)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1048-native-record-leak
      - name: "tier1-native #882 rotation reuse crash gate (exit 0 + no cycle)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-882-native-rotation-reuse-crash
      - name: "tier1-native #995 shared-donor reuse corruption (native orig=3, original not mutated)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-995-native-shared-reuse-corruption
      - name: "tier1-native #995 dead-donor reuse preserved (reuse_in_place > 0)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-995-native-dead-donor-reuse
      - name: "tier1-native #1069 projection-scrutinee reuse gate (both backends golden + recognition ratchet)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1069-projection-reuse
      - name: "tier1-native #950 test runner (native kai test == C summary + exit)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-native-test-runner-950
      - name: "tier1-native #500 build modes (debug DWARF + .kai panic trace, release stripped)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-build-modes
      - name: "tier1-native #514 BigInt parity (arbitrary precision == C backend)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-numeric-bigint-native
      - name: "tier1-native #514 DecimalBig + Rational parity (BigInt carrier == C backend)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-numeric-decimal-rational-native
      - name: Working tree clean check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after native-shard-2"; git status; exit 1
          fi

  # Aggregator (mirrors tier1's). Not a Required check, but keeps the PR's
  # check list to one tidy `tier1-native` status that is green iff both
  # shards pass.
  tier1-native:
    needs: [changes, native-shard-1, native-shard-2]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gate on both native shards
        run: |
          if [ "${{ needs.changes.outputs.doc-only }}" = "true" ]; then
            echo "tier1-native OK — doc-only PR, shards skipped"; exit 0
          fi
          r1='${{ needs.native-shard-1.result }}'
          r2='${{ needs.native-shard-2.result }}'
          echo "native shard results: 1=$r1 2=$r2"
          if [ "$r1" = "success" ] && [ "$r2" = "success" ]; then
            echo "tier1-native OK — both shards green (full corpus parity)"
          else
            echo "::error::tier1-native FAIL — a shard did not succeed"; exit 1
          fi
