name: tier1-native

# tier1-native (KIR Lane 1.2, docs/kir-design.md §"Lane 1.2") gates the
# in-process libLLVM NATIVE backend (`kaic2 --emit=native`,
# docs/kir-design.md §7.2): it builds kaic2 with `KAI_LLVM=1`, then for
# every entry-point fixture emits a native object IN MEMORY via the LLVM C
# API, links it against the effects runtime, runs it, and diffs stdout +
# exit code against the C-direct backend (the oracle).
#
# Why this is an ALWAYS-ON PR gate (not path-gated): since the Lane 1.5 flip
# the in-process libLLVM native backend is the DEFAULT of `kai build` /
# `kai run`, so any change can regress it.
#
# Structure (docs/ci-time-analysis.md §7): a single `build-native` job
# builds the libLLVM kaic2 + P2 bitcode ONCE and publishes them; the corpus
# ratchet (~620 fixtures, the dominant cost) is sharded across three runners
# via $BACKEND_PARITY_DIRS (disjoint subsets whose union is the full corpus),
# and the native self-host gate runs as a fourth parallel consumer of the same
# artifact — nothing downstream depends on its output, so keeping it inside
# build-native would only delay the artifact upload (~13 min off the critical
# path). native is the DEFAULT backend and deserves equal-or-better coverage
# than the C oracle — sharding cuts wall-clock without dropping a fixture.
on:
  pull_request:
  # merge_group makes this required check run inside a GitHub merge queue
  # (harmless while the queue is not enabled in repo settings).
  merge_group:
  push:
    branches: [main]
    # Doc-only pushes and `cz bump` release commits change nothing this
    # gate tests (no status is required on main pushes); the PR side uses
    # the `changes` job instead because the required check must always
    # report a status.
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - 'VERSION'
      - '.cz.toml'

# Cancel a superseded PR run; never cancel a main run — on main
# `github.ref` is constant, so superseding would kill the previous
# commit's verification, its only record of being tested (see tier1.yml).
concurrency:
  group: tier1-native-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      doc-only: ${{ steps.doc-only.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect doc-only diff
        id: doc-only
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if [ -z "$CHANGED" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          NON_DOC=$(echo "$CHANGED" | grep -Ev '^(docs/|[^/]+\.md$|LICENSE$)' || true)
          if [ -z "$NON_DOC" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Doc-only PR; skipping tier1-native."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  # Build the libLLVM-capable kaic2 + P2 runtime bitcode once, assert P2 is
  # active (clang 18 — a dropped clang 18 is a red build, not a silent perf
  # regression), and publish for the shards. Both shards run on identical
  # ubuntu-latest with the same apt llvm-dev, so the dynamically-linked
  # libLLVM kaic2 is ABI-compatible across them.
  build-native:
    needs: changes
    if: needs.changes.outputs.doc-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install toolchain (clang + libLLVM)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang llvm-dev
          LLVM_CONFIG="$(command -v llvm-config || ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -1)"
          if [ -z "$LLVM_CONFIG" ]; then
            echo "::error::no llvm-config found after installing llvm-dev"; exit 1
          fi
          echo "LLVM_CONFIG=$LLVM_CONFIG" >> "$GITHUB_ENV"
          echo "using $LLVM_CONFIG ($($LLVM_CONFIG --version))"
      # Exact-match cache of the native bootstrap chain (same discipline as
      # tier1's build job: no restore-keys — a near-miss chain plus the mtime
      # touch would present a stale kaic2 as fresh). The key folds the clang
      # AND libLLVM identities so a runner-image LLVM bump misses cleanly.
      - name: Fingerprint toolchain for cache key
        id: cc-fp
        run: echo "id=$( (clang --version | head -1; "$LLVM_CONFIG" --version) | tr -c 'A-Za-z0-9' '-')" >> "$GITHUB_OUTPUT"
      - name: Cache native bootstrap chain (exact source match only)
        id: bootstrap-cache
        uses: actions/cache@v4
        with:
          path: |
            stage0/*.o
            stage0/kaic0
            stage1/kaic1
            stage1/build/stage1.c
            stage2/kaic2
            stage2/build/bundle.kai
            stage2/build/stage2.c
            stage0/runtime_llvm.bc
            stage0/runtime_llvm.bc.stamp
            stage0/runtime_inline.bc
          key: kaic2-native-${{ steps.cc-fp.outputs.id }}-${{ hashFiles('Makefile', 'stage0/**', 'stage1/**', 'stage2/**', 'stdlib/**', 'tools/ci-touch-build.sh', 'tools/assert-runtime-bc.sh') }}
      - name: Build native kaic2
        if: steps.bootstrap-cache.outputs.cache-hit != 'true'
        run: |
          rm -f stage2/kaic2
          make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" kaic2 >/dev/null 2>&1
      - name: Mark cached chain fresh (no rebuild)
        if: steps.bootstrap-cache.outputs.cache-hit == 'true'
        run: |
          chmod +x stage0/kaic0 stage1/kaic1 stage2/kaic2
          ./tools/ci-touch-build.sh
      - name: Assert P2 bitcode
        run: tools/assert-runtime-bc.sh
      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaic2-native
          path: |
            stage0/*.o
            stage0/kaic0
            stage1/kaic1
            stage1/build/stage1.c
            stage2/kaic2
            stage2/build/bundle.kai
            stage2/build/stage2.c
            stage0/runtime_llvm.bc
            stage0/runtime_llvm.bc.stamp
            stage0/runtime_inline.bc
          retention-days: 1
          if-no-files-found: error

  # Native self-host gate: compile the compiler itself with the native
  # backend and ratchet the `unbound register` subset-gap count against
  # tools/native-selfhost-baseline.txt — green at baseline, red only on
  # regression (count rises). Also asserts byte-identical C for a
  # Layout-bearing program. Native-only — does not touch the C bootstrap.
  # Runs parallel to the shards on the shared artifact: nothing consumes its
  # output, and the aggregator (a Required check) gates on it. The gate
  # script rebuilds kaic2 from the artifact's stage2.c before self-compiling
  # (the rm+make inside the script), so it pays one cc pass, off the
  # critical path.
  native-selfhost-gate:
    needs: [changes, build-native]
    if: needs.changes.outputs.doc-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install toolchain (clang + libLLVM)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang llvm-dev
          LLVM_CONFIG="$(command -v llvm-config || ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -1)"
          echo "LLVM_CONFIG=$LLVM_CONFIG" >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with:
          name: kaic2-native
      - name: Restore artifact mtimes (no rebuild)
        run: |
          chmod +x stage0/kaic0 stage1/kaic1 stage2/kaic2
          ./tools/ci-touch-build.sh
      - name: "Native self-host gate (ratchet — fails only on regression)"
        run: CC=clang LLVM_CONFIG="$LLVM_CONFIG" tools/test-native-selfhost-gate.sh
      - name: Working tree clean check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after native-selfhost-gate"; git status; exit 1
          fi

  # Shard 1 — effects corpus subset + the curated smoke. The smoke
  # (examples/native, a separate corpus from the ratchet dirs) runs in
  # exactly one shard; duplicating it elsewhere buys nothing.
  native-shard-1:
    needs: [changes, build-native]
    if: needs.changes.outputs.doc-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install toolchain (clang + libLLVM)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang llvm-dev
          LLVM_CONFIG="$(command -v llvm-config || ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -1)"
          echo "LLVM_CONFIG=$LLVM_CONFIG" >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with:
          name: kaic2-native
      - name: Restore artifact mtimes (no rebuild)
        run: |
          chmod +x stage0/kaic0 stage1/kaic1 stage2/kaic2
          ./tools/ci-touch-build.sh
      - name: "Smoke: every examples/native fixture (emit -> link -> run -> diff)"
        run: CC=clang LLVM_CONFIG="$LLVM_CONFIG" tools/test-native-parity.sh
      - name: "Ratchet shard 1 (effects vs C-direct)"
        run: |
          CC=clang LLVM_CONFIG="$LLVM_CONFIG" \
            TARGET_BACKEND=native ORACLE_BACKEND=c NATIVE_PARITY_RATCHET=1 \
            BACKEND_PARITY_DIRS="examples/effects" \
            tools/test-backend-parity.sh
      - name: Working tree clean check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after native-shard-1"; git status; exit 1
          fi

  # Shard 1b — the rest of the former shard-1 subset, split out so the
  # two ratchets run in parallel (~230 vs ~216 fixtures).
  native-shard-1b:
    needs: [changes, build-native]
    if: needs.changes.outputs.doc-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install toolchain (clang + libLLVM)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang llvm-dev
          LLVM_CONFIG="$(command -v llvm-config || ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -1)"
          echo "LLVM_CONFIG=$LLVM_CONFIG" >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with:
          name: kaic2-native
      - name: Restore artifact mtimes (no rebuild)
        run: |
          chmod +x stage0/kaic0 stage1/kaic1 stage2/kaic2
          ./tools/ci-touch-build.sh
      - name: "Ratchet shard 1b (perceus/refinements/actors/llvm/spawn vs C-direct)"
        run: |
          CC=clang LLVM_CONFIG="$LLVM_CONFIG" \
            TARGET_BACKEND=native ORACLE_BACKEND=c NATIVE_PARITY_RATCHET=1 \
            BACKEND_PARITY_DIRS="examples/perceus examples/refinements examples/actors examples/llvm examples/spawn" \
            tools/test-backend-parity.sh
      - name: Working tree clean check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after native-shard-1b"; git status; exit 1
          fi

  # Shard 2 — remaining corpus subset + the #860 cons-RC and #882
  # rotation-reuse native ledger gates.
  native-shard-2:
    needs: [changes, build-native]
    if: needs.changes.outputs.doc-only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install toolchain (clang + libLLVM)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang llvm-dev
          LLVM_CONFIG="$(command -v llvm-config || ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -1)"
          echo "LLVM_CONFIG=$LLVM_CONFIG" >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with:
          name: kaic2-native
      - name: Restore artifact mtimes (no rebuild)
        run: |
          chmod +x stage0/kaic0 stage1/kaic1 stage2/kaic2
          ./tools/ci-touch-build.sh
      - name: "Ratchet shard 2 (packages/minimal/quickstart/stdlib/attributes/unstable/demos vs C-direct)"
        run: |
          CC=clang LLVM_CONFIG="$LLVM_CONFIG" \
            TARGET_BACKEND=native ORACLE_BACKEND=c NATIVE_PARITY_RATCHET=1 \
            BACKEND_PARITY_DIRS="examples/packages examples/minimal examples/quickstart examples/stdlib examples/attributes examples/unstable demos" \
            tools/test-backend-parity.sh
      - name: "tier1-native #1293 CFLAGS .c shim rides the link (bin/kai end-to-end)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-ffi-cflags-shim-native
      - name: "tier1-native #1335 link-time dead-strip (dispatch intact, size reduced)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-native-dead-strip
      - name: "tier1-native #860 cons RC cascade (free_total == alloc_total-1)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-860-native-cons-leak
      - name: "tier1-native #1117 closure-param drop (map-pipe record leak closed)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1117-native-map-pipe-record-leak
      - name: "tier1-native #1134 fused map-pipe chain (byte-identical on native)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1134-pipe-fusion-native
      - name: "tier1-native #1205 closure specialisation (zero per-element call_ind in inlined loop)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-closure-spec-1205
      - name: "tier1-native #1208 return-only tparam grounded from call site (collect loop unboxed)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-collect-ground-1208
      - name: "tier1-native #1208 bind-once for a boxed multi-read stage param (no field freed early)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-collect-multiread-1208
      - name: "tier1-native #1134 range terminal-fold (1M-wide, O(1) stack, byte-identical)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1134-pipe-fusion-terminal-native
      - name: "tier1-native #1143 lambda-stage fusion (alloc-free per element)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1143-pipe-fusion-lambda-native
      - name: "tier1-native #1143 ring/length terminals (alloc-free, decline pinned)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1143-pipe-fusion-ring-native
      - name: "tier1-native #1180 lazy range through every consumer (correctness)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1180-range-lazy-native
      - name: "tier1-native #1180 range sum/reduce O(1) allocs"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1180-range-sum-native
      - name: "tier1-native #1263 abandon across a resumed handler frame (no evidence cycle)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-issue-1263-abandon-across-resumed-frame-native
      - name: "tier1-native #747 variant Real-slot UAF (ASAN clean + parity)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-747-native-real-slot-uaf
      - name: "tier1-native #1048 record scope-exit decref (free_total >= alloc_total-10)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1048-native-record-leak
      - name: "tier1-native #1112 discarded owned value decref (free_total >= alloc_total-10)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1112-native-discard-decref
      - name: "tier1-native #1126 read-loop container drop (array + records reclaimed, leaked bounded)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1126-read-loop-drop-native
      - name: "tier1-native #1130 closure borrow through tail loop (incref collapsed to ~0, no UAF)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1127-borrow-closure-native
      - name: "tier1-native #1130 stdlib HOF closure param active (native output matches)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1127-borrow-hof-native
      - name: "tier1-native #1127 TCO borrowed descent (1M-deep, no stack growth)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1127-borrow-tco-native
      - name: "tier1-native #1314 tcrec goto-tail releases skipped scrutinee + binder refs (leak flat)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1302-tcrec-goto-drops-native
      - name: "tier1-native #1324 Char-binding match excluded from the tcrec goto ledger (no UAF)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1324-char-binder-goto-native
      - name: "tier1-native #1329 borrowed-match unused rest binder elided (leak flat, both payload twins)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1315-borrowed-match-release-native
      - name: "tier1-native #1355 capturing-lambda closure temp released in borrowed HOF slot (leak flat)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1355-closure-temp-release-native
      - name: "tier1-native #1328 multi-use borrowed local released at scope exit (self-tail + tail-read, leak flat)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1328-selftail-borrowed-local-native
      - name: "tier1-native #1130 apply-pipe closure borrow (two reads, no non-callable UAF)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1130-borrow-pipe-native
      - name: "tier1-native #1130 HOF tail-position closure drop-after-call (5000 iters, leaked bounded, TCO intact)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1130-hof-tail-drop-native
      - name: "tier1-native #1135 Vec value semantics (in-place unique, cow shared, unboxed storage, pure rows)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1135-vec-value-native
      - name: "tier1-native #1135 Vec raw element paths (fused moves ride unique-or-copy, qualified self-call keeps goto)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1135-vec-raw-native
      - name: "tier1-native #1151 Vec recursive push growth (grow only at capacity, module CoW + raw regimes to 100k)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1151-vec-push-growth-native
      - name: "tier1-native #1153 module-call linearity (qualified loops move the vec, writes in place)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1153-modcall-linear-native
      - name: "tier1-native #1136 sized-variant gates (static-kind tests, raw ctor-slot rebuild, poly frontier)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1136-sized-variant-native
      - name: "tier1-native #1150 Vec surface (slices O(1) + in-place re-slice, minting, fused collect)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1150-vec-surface-native
      - name: "tier1-native #1156 widened-register raw/boxed arm collision (KLet store border)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1156-raw-widen-native
      - name: "tier1-native #1157 full slot-mask parity (enum/Real raw slots, C oracle + native)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1157-full-mask test-perceus-1157-full-mask-native
      - name: "tier1-native #1160 de-opaque family (inline tag read, static-kind slot reads, tagged compares, raw call-arg binder)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1160-de-opaque test-perceus-1160-de-opaque-native
      - name: "tier1-native #1158 KIR inline vs TRMC tailness (leaf inlined, spine intact, 1M O(1)-stack)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-kir-inline-trmc-1158
      - name: "tier1-native #1158 while fusion to var-slot (no State dispatch left in main)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-kir-while-slot-1158
      - name: "tier1-native #1173 while param-bound var-slot (dead predicate closure swept) + escaping var stays State"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-kir-while-param-slot-1173 test-kir-var-escape-state-1173
      - name: "tier1-native #882 rotation reuse crash gate (exit 0 + no cycle)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-882-native-rotation-reuse-crash
      - name: "tier1-native #995 shared-donor reuse corruption (native orig=3, original not mutated)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-995-native-shared-reuse-corruption
      - name: "tier1-native #995 dead-donor reuse preserved (reuse_in_place > 0)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-995-native-dead-donor-reuse
      - name: "tier1-native #1069 projection-scrutinee reuse gate (both backends golden + recognition ratchet)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1069-projection-reuse
      - name: "tier1-native #1053 TRMC spine token reuse (alloc_total O(N), not O(rebuilds))"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1053-native-trmc-spine-reuse
      - name: "tier1-native #1053 nested rotation reuse (balance donates outer + inner shells)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1053-nested-rotation-reuse
      - name: "tier1-native #872 rb-tree variant-reuse leak gate (leaked a small constant, not O(inserts))"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-872-native-variant-reuse-leak
      - name: "tier1-native #1164 cross-call reuse-token donation (arm token crosses the balance call)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1164-cross-call-donation
      - name: "tier1-native #1083 variant spine-free teardown (decref ceiling + shared child survives)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-perceus-1083-variant-spine-free
      - name: "tier1-native #1083 runtime-op inlining gate (rb-tree kaix_ calls below threshold)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-native-1083-inline-gate
      - name: "tier1-native #1083 pointer-slot borrow soundness (native==C output, RC balanced)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-native-1083-field-read
      - name: "tier1-native Eje1 inline slot read (Int+Real+ptr GEP+load; native==C, RC balanced)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-native-static-slot-read
      - name: "tier1-native #1139 purity attrs (memory(none) on pure fn, no willreturn, duplicate pure call CSE'd)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-native-purity-attrs
      - name: "tier1-native #1110 reuse-in-place Int slot rebuild (native==C, no SIGSEGV)"
        run: make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-native-1110-reuse-int-slot
