        run: CC=clang make -C stage2 KAI_LLVM=1 LLVM_CONFIG="$LLVM_CONFIG" test-mn-c-clang-soundness
      - name: Working tree clean check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after native-shard-2"; git status; exit 1
          fi

  # Aggregator (mirrors tier1's). This is the Required check branch
  # protection gates on: one tidy `tier1-native` status, green iff all
  # shards and the self-host gate pass.
  tier1-native:
    needs: [changes, native-shard-1, native-shard-1b, native-shard-2, native-selfhost-gate]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gate on all native shards + self-host gate
        run: |
          if [ "${{ needs.changes.outputs.doc-only }}" = "true" ]; then
            echo "tier1-native OK — doc-only PR, shards skipped"; exit 0
          fi
          r1='${{ needs.native-shard-1.result }}'
          r1b='${{ needs.native-shard-1b.result }}'
          r2='${{ needs.native-shard-2.result }}'
          r3='${{ needs.native-selfhost-gate.result }}'
          echo "native results: shard1=$r1 shard1b=$r1b shard2=$r2 selfhost-gate=$r3"
          if [ "$r1" = "success" ] && [ "$r1b" = "success" ] && [ "$r2" = "success" ] && [ "$r3" = "success" ]; then
            echo "tier1-native OK — all three shards + self-host gate green (full corpus parity)"
          else
            echo "::error::tier1-native FAIL — a shard or the self-host gate did not succeed"; exit 1
          fi
