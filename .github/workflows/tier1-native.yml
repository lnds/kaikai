name: tier1-native

# tier1-native (KIR Lane 1.2, docs/kir-design.md §"Lane 1.2") gates the
# in-process libLLVM NATIVE backend (`kaic2 --emit=native`,
# docs/kir-design.md §7.2): it builds kaic2 with `KAI_LLVM=1`, then for
# every examples/native/*.kai fixture emits a native object IN MEMORY
# via the LLVM C API, links it against the effects runtime, runs it,
# and diffs stdout + exit code against the C-direct backend (the
# oracle). See tools/test-native-parity.sh.
#
# Why this is an ALWAYS-ON PR gate (not path-gated): since the Lane 1.5
# flip (this branch) the in-process libLLVM native backend is the DEFAULT
# of `kai build` / `kai run`. The gate that protects the default backend
# must run on every PR, exactly the way tier1 protects what used to be
# the C default. Before the flip this workflow was path-gated (it only
# fired on diffs to the native backend, its prims, the runtime
# forwarders, the KIR lowering, or the Makefile that builds it), because
# an opt-in backend is only reachable through those paths. PR #780 proved
# even that was load-bearing: the native `main -> 42` spine was validated
# by hand, a rebase silently re-broke the native prim dispatch in kaic1
# (a non-callable forwarder => runtime panic), and CI stayed green. Now
# that native is the default, ANY change can regress it (e.g. a stdlib
# edit a native fixture exercises), so the path filter is gone — this
# runs on every PR like tier1. The doc-only skip below keeps pure-doc PRs
# free.
#
# This is the single backend-parity gate (native vs C-direct); the old
# llvm-text gate was removed (#850).
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: tier1-native-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tier1-native:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Doc-only PRs short-circuit with SUCCESS (mirrors tier1-asan).
      # The path filter above already excludes pure-doc PRs, but a PR
      # that mixes a path-trigger file with doc edits would still spend
      # a runner without this guard.
      - name: Detect doc-only diff
        id: doc-only
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if [ -z "$CHANGED" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NON_DOC=$(echo "$CHANGED" | grep -Ev '^(docs/|[^/]+\.md$|LICENSE$)' || true)
          if [ -z "$NON_DOC" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Doc-only PR; skipping tier1-native build."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # The native backend links against libLLVM (discovered via
      # llvm-config). Ubuntu's llvm-dev ships a versioned llvm-config
      # (e.g. llvm-config-18); resolve whichever the runner provides and
      # export it for the stage2 Makefile + the harness.
      - name: Install toolchain (clang + libLLVM)
        if: steps.doc-only.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang llvm-dev
          LLVM_CONFIG="$(command -v llvm-config || ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -1)"
          if [ -z "$LLVM_CONFIG" ]; then
            echo "::error::no llvm-config found after installing llvm-dev"
            exit 1
          fi
          echo "LLVM_CONFIG=$LLVM_CONFIG" >> "$GITHUB_ENV"
          echo "using $LLVM_CONFIG ($($LLVM_CONFIG --version))"

      - name: "tier1-native (every native fixture: emit -> link -> run -> diff vs C-direct)"
        if: steps.doc-only.outputs.skip != 'true'
        run: CC=clang LLVM_CONFIG="$LLVM_CONFIG" tools/test-native-parity.sh

      # Native-parity ratchet (KIR Lane 1.5). The curated fixtures above are
      # the smoke; this gates the FULL corpus under --backend=native vs the
      # C-direct oracle against tools/native-parity-baseline.txt. The
      # burn-down reached zero — the baseline is empty, full corpus parity
      # holds, and the Lane 1.5 flip landed (native is now the default). The
      # ratchet stays as a regression gate: a fixture that diverges now but
      # is NOT in the (empty) baseline FAILS, so no new gap can open. A
      # listed-but-passing fixture would prompt to tighten the baseline —
      # there are none left to list.
      - name: "tier1-native ratchet (full corpus native vs C-direct, no new gaps)"
        if: steps.doc-only.outputs.skip != 'true'
        run: |
          CC=clang LLVM_CONFIG="$LLVM_CONFIG" \
            TARGET_BACKEND=native ORACLE_BACKEND=c NATIVE_PARITY_RATCHET=1 \
            tools/test-backend-parity.sh

      - name: Working tree clean check
        if: steps.doc-only.outputs.skip != 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after tier1-native; build artifacts leaked into tracked paths"
            git status
            exit 1
          fi
