name: warm-llvm-cache

# Keeps the vendored static-libLLVM cache populated so the release job
# always hits it. Without this, a run of failed releases leaves the cache
# empty (actions/cache saves in a post-step that never runs on failure),
# and the next successful release pays the ~25-min cold build. This job
# builds libLLVM on a schedule against the SAME key as release.yml, so a
# tag push finds a warm cache regardless of prior release outcomes.

on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  warm:
    name: Warm libLLVM cache (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      # Must match release.yml and mk/llvm.mk.
      LLVM_VERSION: 18.1.8
    steps:
      - uses: actions/checkout@v4

      - name: Install cmake + ninja
        run: |
          if ! command -v cmake >/dev/null 2>&1 || ! command -v ninja >/dev/null 2>&1; then
            brew install cmake ninja
          fi

      # Same key + paths as release.yml so this run's saved cache is the
      # one the release job restores.
      - name: Cache vendored static libLLVM
        uses: actions/cache@v4
        with:
          path: |
            stage0/third_party/llvm
            stage0/third_party/cmake
            stage0/third_party/llvm-${{ env.LLVM_VERSION }}.src.tar.xz
            stage0/third_party/cmake-${{ env.LLVM_VERSION }}.src.tar.xz
          key: llvm-static-${{ runner.os }}-${{ env.LLVM_VERSION }}-${{ hashFiles('mk/llvm.mk') }}
          restore-keys: |
            llvm-static-${{ runner.os }}-${{ env.LLVM_VERSION }}-

      # Idempotent: a restored build/ is a no-op, a miss pays the cold build.
      - name: Build libLLVM
        run: make llvm-build
