name: tier1-asan

# tier1-asan runs `make tier1-asan` (26 demos + 6 trace fixtures
# under ASAN+UBSan) on PRs that touch runtime, emit, perceus, or
# the fiber/RC fixtures it gates. It is structurally narrower than
# tier1: only diffs in the paths below trigger this workflow, so a
# typer-only or fmt-only PR doesn't pay the ~5 min ASAN tax.
#
# Rationale: tier1.yml gates correctness on every PR; tier1-asan
# gates memory-shape regressions for the subset of code that can
# produce them (runtime helpers, C emit, RC discipline, fiber
# spawn/await). When this gate fails on Linux but tier1 passes on
# macOS — the PR #111 case — it means the fix is non-portable, which
# is exactly the failure tier1-asan exists to catch.
on:
  pull_request:
    paths:
      - 'stage0/**'
      - 'stage1/compiler.kai'
      - 'stage2/compiler.kai'
      - 'stage2/Makefile'
      - 'stdlib/**'
      - 'examples/effects/**'
      - 'examples/perceus/**'
      - '.github/workflows/tier1-asan.yml'
  push:
    branches: [main]
    # Doc-only pushes and `cz bump` release commits cannot regress ASAN.
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - 'VERSION'
      - '.cz.toml'

concurrency:
  group: tier1-asan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tier1-asan:
    # Linux glibc tcache strict-mode is the gate ASAN+UBSan needs;
    # ubuntu-latest provides it.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Doc-only PRs (diff confined to docs/, root *.md, LICENSE)
      # short-circuit here with SUCCESS so the required tier1-asan
      # check is satisfied without spending a runner. Mirrors the
      # tier1.yml doc-only gate — path-filters on the workflow trigger
      # already exclude many doc-only PRs from this workflow, but when
      # a PR mixes a path-trigger file with doc-only changes (e.g. a
      # stdlib doc tweak in the same PR as an unrelated stage2 edit),
      # this gate keeps the runner free.
      - name: Detect doc-only diff
        id: doc-only
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if [ -z "$CHANGED" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NON_DOC=$(echo "$CHANGED" | grep -Ev '^(docs/|[^/]+\.md$|LICENSE$)' || true)
          if [ -z "$NON_DOC" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Doc-only PR; skipping tier1-asan build."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install toolchain
        if: steps.doc-only.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang

      - name: tier1-asan (26 demos + trace fixtures under ASAN+UBSan)
        if: steps.doc-only.outputs.skip != 'true'
        run: make CC=clang tier1-asan

      - name: Working tree clean check
        if: steps.doc-only.outputs.skip != 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after tier1-asan; build artifacts leaked into tracked paths"
            git status
            exit 1
          fi
