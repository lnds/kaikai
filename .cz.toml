[tool.commitizen]
name = "cz_conventional_commits"
version = "0.50.0"
version_files = ["VERSION"]
tag_format = "v$version"
update_changelog_on_bump = true
changelog_file = "CHANGELOG.md"
changelog_incremental = true
major_version_zero = true

# Map cz's default Conventional-Commits types onto Keep-a-Changelog
# section names so the generated section headings match the legacy
# (pre-cz) CHANGELOG entries.
change_type_map = { "feat" = "Added", "fix" = "Fixed", "perf" = "Changed", "refactor" = "Changed" }
change_type_order = ["BREAKING CHANGE", "Added", "Fixed", "Changed", "Removed"]

# Skip CI on bump commits — they only touch VERSION, CHANGELOG.md, .cz.toml,
# none of which affect runtime/compiler/stdlib. release.yml is triggered by
# the tag push, not the bump commit, so the release pipeline still runs.
bump_message = "bump: version $current_version → $new_version [skip ci]"
